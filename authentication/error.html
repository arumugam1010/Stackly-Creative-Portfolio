<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Error | Stackly</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/authentication.css">
</head>
<body>

  <div class="background-blobs">
    <div class="blob blob-cyan"></div>
    <div class="blob blob-purple"></div>
  </div>

  <div class="auth-wrapper">
    <div class="glass-panel auth-card" style="text-align: center;">
      <div class="error-cross-circle">✕</div>
      <h2 class="auth-title">Verification Fault</h2>
      <p class="auth-subtitle">The cryptographic verification code or OTP provided has expired or is invalid.</p>

      <a href="login.html" class="btn-neon ripple-btn" style="width:100%; justify-content: center; margin-top:2rem;">Retry Sign In</a>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
