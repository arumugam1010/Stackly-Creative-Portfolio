<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost in Deep Space | 404 Error | Stackly</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .space-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 2rem;
    }
    
    .stars-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(circle at centre, #0d0f1c 0%, #050508 100%);
    }

    .stars-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .error-code {
      font-family: var(--font-title);
      font-size: 8rem;
      font-weight: 800;
      margin: 0;
      line-height: 1;
      background: var(--grad-purple-magenta);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: float-text 6s ease-in-out infinite;
      text-shadow: 0 0 40px rgba(255, 0, 127, 0.2);
    }

    @keyframes float-text {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .astronaut-svg {
      width: 220px;
      height: 220px;
      margin-bottom: 2rem;
      animation: float-astro 8s ease-in-out infinite alternate;
    }

    @keyframes float-astro {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
      100% { transform: translateY(10px) rotate(-8deg); }
    }

    .error-title {
      font-family: var(--font-title);
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .error-desc {
      color: var(--text-secondary);
      max-width: 500px;
      margin-bottom: 3rem;
      line-height: 1.6;
    }

    .links-grid {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <!-- Floating background blobs -->
  <div class="background-blobs">
    <div class="blob blob-cyan"></div>
    <div class="blob blob-purple"></div>
  </div>

  <div class="space-container">
    <div class="stars-bg">
      <canvas class="stars-canvas" id="stars"></canvas>
    </div>

    <!-- Floating astronaut SVG -->
    <svg class="astronaut-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="astroGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#cbd5e1" />
        </linearGradient>
        <linearGradient id="visorGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#00f2fe" />
          <stop offset="100%" stop-color="#ff007f" />
        </linearGradient>
      </defs>
      <!-- Helmet tether line -->
      <path d="M 50,85 C 40,95 20,80 10,95" fill="none" stroke="rgba(255, 255, 255, 0.25)" stroke-width="2" stroke-dasharray="4,4"/>
      <!-- Body/Suit -->
      <rect x="35" y="45" width="30" height="35" rx="10" fill="url(#astroGrad)" />
      <!-- Backpack -->
      <rect x="27" y="48" width="10" height="25" rx="3" fill="#64748b" />
      <rect x="63" y="48" width="10" height="25" rx="3" fill="#64748b" />
      <!-- Arms -->
      <rect x="25" y="48" width="10" height="20" rx="5" fill="url(#astroGrad)" transform="rotate(-30 30 50)" />
      <rect x="65" y="48" width="10" height="20" rx="5" fill="url(#astroGrad)" transform="rotate(30 70 50)" />
      <!-- Legs -->
      <rect x="37" y="75" width="10" height="15" rx="4" fill="url(#astroGrad)" />
      <rect x="53" y="75" width="10" height="15" rx="4" fill="url(#astroGrad)" />
      <!-- Helmet -->
      <circle cx="50" cy="33" r="18" fill="url(#astroGrad)" />
      <!-- Visor -->
      <ellipse cx="50" cy="31" rx="12" ry="8" fill="url(#visorGrad)" />
      <!-- Reflection shine -->
      <ellipse cx="46" cy="27" rx="3" ry="1.5" fill="#ffffff" opacity="0.6" />
    </svg>

    <h1 class="error-code">404</h1>
    <h2 class="error-title">Orbit Boundary Exceeded</h2>
    <p class="error-desc">The computational address you are trying to query does not reside on this node. It may have drifted into deep space or been decommissioned.</p>
    
    <div class="links-grid">
      <a href="index.html" class="btn-neon ripple-btn">Return Home</a>
      <a href="pages/contact.html" class="btn-outline ripple-btn">Contact Control</a>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    // Starfield animation
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    const stars = [];
    for (let i = 0; i < 150; i++) {
      stars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 1.5,
        alpha: Math.random()
      });
    }

    function animateStars() {
      ctx.clearRect(0, 0, width, height);
      stars.forEach(star => {
        star.alpha += (Math.random() - 0.5) * 0.05;
        if (star.alpha < 0.1) star.alpha = 0.1;
        if (star.alpha > 1) star.alpha = 1;
        
        ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(animateStars);
    }
    animateStars();

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
